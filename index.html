<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kroniek van een Kampioenschap</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #5bb3c6;
      --black: #000000;
      --white: #ffffff;
      --purple: #26175a;
      --green: #1a7c4c;
      --hover-green: #1a7c4c;
    }
    body {
      margin: 0;
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--bg);
      color: var(--white);
      line-height: 1.6;
    }
    header {
      text-align: center;
      padding: 3rem 1rem;
      background: linear-gradient(135deg, var(--black), #222);
    }
    header img {
      width: 350px;
      max-width: 90%;
      transition: transform 0.3s ease;
    }
    header img:hover {
      transform: scale(1.05);
    }
    h1 {
      margin-top: 1rem;
      font-size: 3rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      color: var(--white);
    }
    h2 {
        border-bottom: 2px solid rgba(255,255,255,0.2);
        padding-bottom: 0.5rem;
        margin-top: 2rem;
    }
    .subtitle {
      margin-top: 0.5rem;
      font-size: 1.2rem;
      color: var(--white);
    }
    .bio {
      margin-top: 1rem;
      font-size: 1rem;
      color: var(--white);
      background: rgba(255,255,255,0.1);
      display: inline-block;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      max-width: 700px;
      line-height: 1.4;
    }
    .section {
      padding: 1rem 1rem;
      max-width: 900px;
      margin: auto;
    }
    .feeds {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
      margin-top: 1rem;
    }
    .feeds a {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      justify-content: center;
      background: var(--white);
      color: var(--black);
      width: 300px;
      max-width: 100%;
      padding: 1.2rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
      transition: transform 0.2s, background 0.2s, color 0.2s;
    }
    .feeds a img {
      height: 24px;
      width: 24px;
    }
    .feeds a:hover {
      transform: translateY(-3px);
      background: var(--hover-green);
      color: var(--white);
    }
    .feeds a:hover img, .platforms a:hover img {
        filter: invert(1);
    }
    .platforms {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .platforms a {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
      color: var(--black);
      width: 60px;
      height: 60px;
      border-radius: 12px;
      text-decoration: none;
      transition: transform 0.2s, background 0.2s;
    }
    .platforms a img {
      height: 30px;
      width: 30px;
    }
    .platforms a:hover {
      transform: translateY(-3px);
      background: var(--hover-green);
    }
    .contact-container {
        text-align: center;
        margin-top: 2rem;
    }
    .contact-button {
      display:inline-block;
      padding:1.2rem 2.5rem;
      background:var(--purple);
      color:var(--white);
      border-radius:8px;
      text-decoration:none;
      font-weight:bold;
      font-size:1.2rem;
      transition: background 0.3s, transform 0.3s;
    }
    .contact-button:hover {
      background: var(--hover-green);
      transform: translateY(-2px);
    }
    footer {
      text-align: center;
      padding: 2rem 1rem;
      background: var(--black);
      color: var(--white);
      margin-top: 4rem;
    }
    /* Aangepaste styling voor teamnamen zonder lichtblauwe balk */
    h3 {
        text-align: center;
        margin-top: 2.5rem;
        margin-bottom: 0.5rem;
        color: var(--purple);
        font-family: 'Montserrat', sans-serif;
        text-transform: uppercase;
        letter-spacing: 1px;
        position: relative;
        display: block;
    }
    h3::after {
        content: '';
        display: block;
        width: 50px;
        height: 3px;
        background: var(--purple);
        margin: 8px auto 0;
        border-radius: 2px;
    }
  </style>
</head>
<body>

    <img src="https://archive.org/download/logo2_1400/logo2_1400.png" alt="Logo Kroniek van een Kampioenschap" />
    <h1>Kroniek van een Kampioenschap</h1>

  </header>
